<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CARMOTORS — Órdenes</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --navy:#1B3A5C; --steel:#4A8FB5; --red:#C0392B; --orange:#E8821A; --cream:#F5F0E8; --dark:#0f2236; --card:#1e3f60; --border:#2a5278; --text:#d4e8f5; --muted:#7aaec8; --green:#5ddb8c; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--dark); color:var(--text); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; padding-bottom:70px; }
    header { background:var(--navy); border-bottom:2px solid var(--orange); padding:14px 20px; display:flex; align-items:center; gap:12px; }
    .lm { width:36px; height:36px; background:var(--orange); clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); display:flex; align-items:center; justify-content:center; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:13px; color:var(--dark); }
    h1 { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; letter-spacing:2px; color:var(--cream); }
    .tabs { display:flex; background:var(--navy); border-bottom:1px solid var(--border); overflow-x:auto; }
    .tbtn { padding:12px 14px; background:none; border:none; color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; }
    .tbtn.active { color:var(--orange); border-bottom-color:var(--orange); }
    main { padding:16px; max-width:800px; margin:0 auto; }
    .sec { display:none; }
    .sec.active { display:block; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:16px; }
    .ctitle { font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; color:var(--orange); margin-bottom:12px; text-transform:uppercase; }
    .fl { display:block; font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; margin-top:10px; }
    input, select { width:100%; background:var(--dark); border:1px solid var(--border); border-radius:6px; padding:9px 12px; color:var(--text); font-size:14px; outline:none; }
    select option { background:var(--dark); }
    .r2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .btnmain { width:100%; padding:13px; background:var(--orange); color:var(--dark); border:none; border-radius:8px; font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; cursor:pointer; margin-top:12px; }
    .btnmain:disabled { background:var(--border); }
    .btnsmall { background:#103040; color:var(--steel); border:1px solid var(--border); border-radius:6px; padding:6px 12px; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; cursor:pointer; }
    .btngreen { background:#1a3d2b; color:var(--green); border:1px solid #2a6040; }
    .btnred { background:#3d1a1a; color:#e07070; border:1px solid #6a2a2a; }
    .msg { padding:10px; border-radius:6px; font-size:13px; margin-bottom:10px; display:none; }
    .msgok { background:#1a3d2b; color:var(--green); border:1px solid #2a6040; display:block; }
    .msgerr { background:#3d1a1a; color:#e07070; border:1px solid #6a2a2a; display:block; }
    .orcard { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px; margin-bottom:10px; cursor:pointer; transition:border-color 0.2s; }
    .orcard:hover { border-color:var(--orange); }
    .ortit { font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:700; color:var(--cream); }
    .orsub { font-size:12px; color:var(--muted); margin-top:4px; }
    .orbdg { display:inline-block; font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px; text-transform:uppercase; margin-top:6px; background:#3d3010; color:var(--orange); }
    .orbdga { background:#1a3d2b; color:var(--green); }
    .orbdgp { background:#103040; color:var(--steel); }
    .orbdgt { background:#1a2a3a; color:#a0b8d4; }
    .oirow { background:var(--dark); border:1px solid var(--border); border-radius:8px; padding:10px; margin-top:8px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .oinom { font-size:13px; color:var(--cream); }
    .oisub { font-size:11px; color:var(--muted); }
    .oipr { font-family:'Rajdhani',sans-serif; font-size:16px; color:var(--orange); font-weight:700; }
    .bdel { background:none; border:none; color:var(--red); font-size:18px; cursor:pointer; }
    .otbox { background:var(--navy); border:1px solid var(--orange); border-radius:8px; padding:12px; margin-top:10px; }
    .otr { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:4px; }
    .otf { display:flex; justify-content:space-between; font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; color:var(--orange); border-top:1px solid var(--border); padding-top:8px; margin-top:6px; }
    .filtros { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .fbtn { background:var(--dark); border:2px solid var(--border); border-radius:6px; padding:6px 12px; font-family:'Rajdhani',sans-serif; font-size:13px; cursor:pointer; color:var(--muted); }
    .fbtn.on { border-color:var(--orange); color:var(--orange); }
    .empty { text-align:center; padding:40px 20px; color:var(--muted); }
    .empty span { display:block; font-size:32px; margin-bottom:8px; }
    .loading { text-align:center; padding:30px; color:var(--muted); font-size:13px; }
    .acc { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
    .bnav { position:fixed; bottom:0; left:0; right:0; background:var(--navy); border-top:2px solid var(--border); display:flex; z-index:100; }
    .bnav a { flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 4px; text-decoration:none; color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:11px; font-weight:600; gap:2px; }
    .bnav a.on { color:var(--orange); border-top:2px solid var(--orange); margin-top:-2px; }
    .bnav a span { font-size:20px; }
  </style>
</head>
<body>
<header>
  <div class="lm">CM</div>
  <h1>ÓRDENES CARMOTORS</h1>
</header>

<div class="tabs">
  <button class="tbtn active" onclick="sw('lista',this)">📋 Órdenes</button>
  <button class="tbtn" onclick="sw('nueva',this)">➕ Nueva</button>
</div>

<main>

<div id="sec-lista" class="sec active">
  <div class="filtros">
    <button class="fbtn on" onclick="filt('todas')">Todas</button>
    <button class="fbtn" onclick="filt('abierta')">Abierta</button>
    <button class="fbtn" onclick="filt('proceso')">En proceso</button>
    <button class="fbtn" onclick="filt('terminada')">Terminada</button>
  </div>
  <div id="lista-ordenes"><div class="loading">Cargando...</div></div>
</div>

<div id="sec-nueva" class="sec">
  <div class="card">
    <div class="ctitle">➕ Nueva orden</div>
    <div id="msg" class="msg"></div>
    <label class="fl">Cliente</label>
    <select id="ocliente" onchange="chCliente()">
      <option value="">Selecciona cliente...</option>
    </select>
    <label class="fl">Vehiculo</label>
    <input type="text" id="ovehiculo" placeholder="Honda CB 110"/>
    <label class="fl">Placa</label>
    <input type="text" id="oplaca" placeholder="ABC123"/>
    <label class="fl">Descripcion de la orden</label>
    <input type="text" id="odesc" placeholder="Diagnóstico general, cambio de aceite..."/>
    <button class="btnmain" onclick="crearOrden()">✅ CREAR ORDEN</button>
  </div>
</div>

<div id="sec-detalle" class="sec">
  <div class="card">
    <div class="ctitle" id="det-titulo">Orden</div>
    <div id="msg2" class="msg"></div>
    <div id="det-info"></div>
    <label class="fl" style="margin-top:16px">Estado</label>
    <select id="detstado" onchange="cambiarEstado()">
      <option value="abierta">🟢 Abierta</option>
      <option value="proceso">🟡 En proceso</option>
      <option value="terminada">✅ Terminada</option>
    </select>
    
    <label class="fl">Tipo de item</label>
    <select id="dtipo" onchange="chTipo()">
      <option value="servicio">🔧 Servicio</option>
      <option value="repuesto">🔩 Repuesto</option>
    </select>
    <div id="boxrep" style="display:none">
      <label class="fl">Repuesto</label>
      <select id="drep" onchange="chRep()">
        <option value="">Selecciona...</option>
      </select>
    </div>
    <label class="fl">Descripcion</label>
    <input type="text" id="ddesc" placeholder="Cambio de aceite..."/>
    <div class="r2" style="margin-top:10px">
      <div><label class="fl">Cantidad</label><input type="number" id="dcant" value="1" min="1"/></div>
      <div><label class="fl">Precio ($)</label><input type="number" id="dprecio" placeholder="0"/></div>
    </div>
    <button class="btnmain" style="margin-top:10px; background:#103040; color:var(--steel)" onclick="addItem()">+ AGREGAR ITEM</button>
    
    <div id="det-items"></div>
    <div id="det-total" class="otbox" style="display:none">
      <div class="otr"><span>Items</span><span id="dcnt">0</span></div>
      <div class="otr"><span>Ganancia</span><span id="dgan" style="color:var(--green)">$0</span></div>
      <div class="otf"><span>TOTAL</span><span id="dtot">$0</span></div>
    </div>

    <div class="acc">
      <button class="btnsmall" onclick="volverLista()">← VOLVER</button>
      <button class="btnsmall btngreen" id="btnconvertir" style="display:none" onclick="convertirVenta()">💰 CONVERTIR A VENTA</button>
      <button class="btnsmall btnred" onclick="eliminarOrden()">🗑️ ELIMINAR</button>
    </div>
  </div>
</div>

</main>

<nav class="bnav">
  <a href="index.html"><span>🏠</span>PANEL</a>
  <a href="ventas.html"><span>💰</span>VENTAS</a>
  <a href="clientes.html"><span>👥</span>CLIENTES</a>
  <a href="ordenes.html" class="on"><span>📋</span>ÓRDENES</a>
  <a href="admin.html"><span>⚙️</span>ADMIN</a>
</nav>
<script>
const SUPABASE_URL = 'https://ozpinusbfjjuvkcgkpgr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96cGludXNiZmpqdXZrY2drcGdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTU1NjAsImV4cCI6MjA5MzE3MTU2MH0.AGWaOo4RWnOCt9WlIwL1OFBsFTcKlV4mdFI5ytSpLbs';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let ordenes = [];
let articulos = [];
let clientes = [];
let ordenActual = null;
let items = [];
let filtroActual = 'todas';

const fmt = n => '$' + Number(n||0).toLocaleString('es-CO');

function sw(sec, btn) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + sec).classList.add('active');
  btn.classList.add('active');
  if (sec === 'lista') cargarOrdenes();
}

function filt(estado) {
  filtroActual = estado;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
  cargarOrdenes();
}

async function cargarOrdenes() {
  let query = db.from('ordenes_trabajo').select('*, clientes(nombre, telefono)');
  if (filtroActual !== 'todas') query = query.eq('estado', filtroActual);
  const res = await query.order('creado_en', { ascending: false });
  ordenes = res.data || [];
  const cont = document.getElementById('lista-ordenes');
  if (!ordenes.length) { cont.innerHTML = '<div class="empty"><span>📋</span>Sin órdenes.</div>'; return; }
  cont.innerHTML = '';
  ordenes.forEach(o => {
    const card = document.createElement('div');
    card.className = 'orcard';
    card.onclick = () => mostrarDetalle(o.id);
    const est = o.estado === 'abierta' ? '🟢' : o.estado === 'proceso' ? '🟡' : '✅';
    const bdgclass = o.estado === 'abierta' ? 'orbdga' : o.estado === 'proceso' ? 'orbdgp' : 'orbdgt';
    let html = '<div class="ortit">' + (o.clientes?.nombre || 'Sin cliente') + '</div>';
    html += '<div class="orsub">🏍️ ' + o.vehiculo + (o.placa ? ' - ' + o.placa : '') + '</div>';
    html += '<div class="orsub">📝 ' + o.descripcion + '</div>';
    html += '<div class="orbdg ' + bdgclass + '">' + est + ' ' + o.estado + '</div>';
    card.innerHTML = html;
    cont.appendChild(card);
  });
}

async function cargarArticulos() {
  const res = await db.from('articulos').select('*').order('nombre');
  articulos = res.data || [];
  const sel = document.getElementById('drep');
  sel.innerHTML = '<option value="">Selecciona...</option>';
  articulos.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.id;
    opt.textContent = a.nombre + ' - Stock:' + a.stock + ' - ' + fmt(a.precio);
    sel.appendChild(opt);
  });
}

async function cargarClientes() {
  const res = await db.from('clientes').select('id, nombre, vehiculo, placa').order('nombre');
  clientes = res.data || [];
  const sel = document.getElementById('ocliente');
  sel.innerHTML = '<option value="">Selecciona cliente...</option>';
  clientes.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.nombre;
    sel.appendChild(opt);
  });
}

function chCliente() {
  const id = document.getElementById('ocliente').value;
  const c = clientes.find(x => x.id === id);
  if (c) {
    document.getElementById('ovehiculo').value = c.vehiculo || '';
    document.getElementById('oplaca').value = c.placa || '';
  }
}

async function crearOrden() {
  const cliente_id = document.getElementById('ocliente').value;
  const vehiculo = document.getElementById('ovehiculo').value.trim();
  const placa = document.getElementById('oplaca').value.trim();
  const descripcion = document.getElementById('odesc').value.trim();
  if (!cliente_id) { msg('⚠️ Selecciona un cliente.', 'err', 'msg'); return; }
  if (!vehiculo) { msg('⚠️ Ingresa el vehículo.', 'err', 'msg'); return; }
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'CREANDO...';
  const res = await db.from('ordenes_trabajo').insert({ cliente_id: cliente_id || null, vehiculo, placa: placa || null, descripcion: descripcion || 'Nueva orden', estado: 'abierta' }).select().single();
  if (res.error) { btn.disabled = false; btn.textContent = '✅ CREAR ORDEN'; msg('❌ ' + res.error.message, 'err', 'msg'); return; }
  btn.disabled = false;
  btn.textContent = '✅ CREAR ORDEN';
  msg('✅ Orden creada.', 'ok', 'msg');
  document.getElementById('ocliente').value = '';
  document.getElementById('ovehiculo').value = '';
  document.getElementById('oplaca').value = '';
  document.getElementById('odesc').value = '';
  await cargarOrdenes();
}

async function mostrarDetalle(id) {
  ordenActual = ordenes.find(o => o.id === id);
  if (!ordenActual) return;
  items = [];
  document.getElementById('sec-lista').classList.remove('active');
  document.getElementById('sec-detalle').classList.add('active');
  document.getElementById('det-titulo').textContent = (ordenActual.clientes?.nombre || 'Sin cliente') + ' - ' + ordenActual.vehiculo;
  document.getElementById('detstado').value = ordenActual.estado;
  const info = document.getElementById('det-info');
  info.innerHTML = '';
  const rows = [
    ['Cliente', ordenActual.clientes?.nombre || '-'],
    ['Vehículo', ordenActual.vehiculo],
    ['Placa', ordenActual.placa || '-'],
    ['Descripción', ordenActual.descripcion],
    ['Estado', ordenActual.estado],
    ['Creado', ordenActual.creado_en?.substring(0, 10) || '-']
  ];
  rows.forEach(r => {
    const row = document.createElement('div');
    row.className = 'otr';
    const lbl = document.createElement('span');
    lbl.textContent = r[0];
    const val = document.createElement('span');
    val.style.color = 'var(--cream)';
    val.style.fontWeight = '600';
    val.textContent = r[1];
    row.appendChild(lbl);
    row.appendChild(val);
    info.appendChild(row);
  });
  const btnConv = document.getElementById('btnconvertir');
  btnConv.style.display = ordenActual.estado === 'terminada' ? 'block' : 'none';
  cargarItemsOrden();
  await cargarArticulos();
}

async function cargarItemsOrden() {
  if (!ordenActual) return;
  const res = await db.from('orden_items').select('*').eq('orden_id', ordenActual.id);
  items = res.data || [];
  renderItems();
}

function chTipo() {
  const tipo = document.getElementById('dtipo').value;
  document.getElementById('boxrep').style.display = tipo === 'repuesto' ? 'block' : 'none';
}

function chRep() {
  const id = document.getElementById('drep').value;
  const art = articulos.find(a => a.id === id);
  if (art) {
    document.getElementById('ddesc').value = art.nombre;
    document.getElementById('dprecio').value = art.precio;
  }
}

async function addItem() {
  const tipo = document.getElementById('dtipo').value;
  const desc = document.getElementById('ddesc').value.trim();
  const cant = parseInt(document.getElementById('dcant').value) || 1;
  const precio = parseFloat(document.getElementById('dprecio').value) || 0;
  if (!desc) { msg('⚠️ Descripcion requerida.', 'err', 'msg2'); return; }
  if (!precio) { msg('⚠️ Precio requerido.', 'err', 'msg2'); return; }
  let costo = 0, articulo_id = null;
  if (tipo === 'repuesto') {
    const id = document.getElementById('drep').value;
    const art = articulos.find(a => a.id === id);
    if (art) { costo = art.costo || 0; articulo_id = art.id; }
  }
  const item = { tipo, descripcion: desc, cantidad: cant, precio_unitario: precio, costo_unitario: costo, subtotal: cant * precio, articulo_id };
  if (ordenActual.id) {
    const res = await db.from('orden_items').insert({ orden_id: ordenActual.id, ...item }).select().single();
    if (res.error) { msg('❌ ' + res.error.message, 'err', 'msg2'); return; }
    item.id = res.data.id;
  }
  items.push(item);
  renderItems();
  document.getElementById('ddesc').value = '';
  document.getElementById('dprecio').value = '';
  document.getElementById('dcant').value = '1';
  document.getElementById('drep').value = '';
  msg('✅ Item agregado.', 'ok', 'msg2');
}

function renderItems() {
  const lista = document.getElementById('det-items');
  const tbox = document.getElementById('det-total');
  if (!items.length) { lista.innerHTML = ''; tbox.style.display = 'none'; return; }
  lista.innerHTML = '';
  let total = 0, gan = 0;
  items.forEach((it, i) => {
    total += it.subtotal;
    gan += (it.precio_unitario - it.costo_unitario) * it.cantidad;
    const row = document.createElement('div');
    row.className = 'oirow';
    const info = document.createElement('div');
    const nom = document.createElement('div');
    nom.className = 'oinom';
    nom.textContent = (it.tipo === 'repuesto' ? '🔩 ' : '🔧 ') + it.descripcion;
    const sub = document.createElement('div');
    sub.className = 'oisub';
    sub.textContent = it.cantidad + ' x ' + fmt(it.precio_unitario);
    info.appendChild(nom);
    info.appendChild(sub);
    const pr = document.createElement('div');
    pr.className = 'oipr';
    pr.textContent = fmt(it.subtotal);
    const del = document.createElement('button');
    del.className = 'bdel';
    del.textContent = 'x';
    del.onclick = () => eliminarItem(i, it.id);
    row.appendChild(info);
    row.appendChild(pr);
    row.appendChild(del);
    lista.appendChild(row);
  });
  document.getElementById('dcnt').textContent = items.length;
  document.getElementById('dgan').textContent = fmt(gan);
  document.getElementById('dtot').textContent = fmt(total);
  tbox.style.display = 'block';
}

async function eliminarItem(idx, item_id) {
  if (item_id) await db.from('orden_items').delete().eq('id', item_id);
  items.splice(idx, 1);
  renderItems();
}

async function cambiarEstado() {
  if (!ordenActual) return;
  const estado = document.getElementById('detstado').value;
  await db.from('ordenes_trabajo').update({ estado }).eq('id', ordenActual.id);
  ordenActual.estado = estado;
  const btnConv = document.getElementById('btnconvertir');
  btnConv.style.display = estado === 'terminada' ? 'block' : 'none';
  msg('✅ Estado actualizado.', 'ok', 'msg2');
}

async function convertirVenta() {
  if (!ordenActual || !items.length) { msg('⚠️ Agrega items a la orden.', 'err', 'msg2'); return; }
  const total = items.reduce((s, i) => s + i.subtotal, 0);
  const ganancia = items.reduce((s, i) => s + (i.precio_unitario - i.costo_unitario) * i.cantidad, 0);
  const descripcion = items.map(i => i.descripcion).join(', ');
  const tieneRep = items.some(i => i.tipo === 'repuesto');
  const tieneServ = items.some(i => i.tipo === 'servicio');
  const tipo = tieneRep && tieneServ ? 'mixto' : items[0].tipo;
  const fecha = new Date().toISOString().split('T')[0];
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'CONVIRTIENDO...';
  const vRes = await db.from('ventas').insert({ cliente_id: ordenActual.cliente_id, tipo, descripcion, total, ganancia, estado_pago: 'pagado', metodo_pago: 'orden', abonado: total, saldo: 0, fecha }).select().single();
  if (vRes.error) { btn.disabled = false; btn.textContent = '💰 CONVERTIR A VENTA'; msg('❌ ' + vRes.error.message, 'err', 'msg2'); return; }
  const venta = vRes.data;
  await db.from('venta_items').insert(items.map(i => Object.assign({}, i, { venta_id: venta.id })));
  await db.from('pagos').insert({ venta_id: venta.id, monto: total, metodo: 'orden', nota: 'Convertida desde orden ' + ordenActual.id });
  for (let i of items) {
    if (i.articulo_id) {
      const art = articulos.find(a => a.id === i.articulo_id);
      if (art) await db.from('articulos').update({ stock: Math.max(0, art.stock - i.cantidad) }).eq('id', art.id);
    }
  }
  await db.from('ordenes_trabajo').update({ estado: 'pagada' }).eq('id', ordenActual.id);
  btn.disabled = false;
  btn.textContent = '💰 CONVERTIR A VENTA';
  msg('✅ Venta creada desde orden.', 'ok', 'msg2');
  volverLista();
  await cargarOrdenes();
}

async function eliminarOrden() {
  if (!ordenActual) return;
  if (!confirm('⚠️ Eliminar orden? Los items también se borrarán.')) return;
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'ELIMINANDO...';
  await db.from('orden_items').delete().eq('orden_id', ordenActual.id);
  await db.from('ordenes_trabajo').delete().eq('id', ordenActual.id);
  btn.disabled = false;
  btn.textContent = '🗑️ ELIMINAR';
  volverLista();
}

function volverLista() {
  ordenActual = null;
  items = [];
  document.getElementById('sec-detalle').classList.remove('active');
  document.getElementById('sec-lista').classList.add('active');
  cargarOrdenes();
}

function msg(txt, tipo, el) {
  const el_msg = document.getElementById(el);
  el_msg.textContent = txt;
  el_msg.className = 'msg ' + (tipo === 'ok' ? 'msgok' : 'msgerr');
  setTimeout(() => { el_msg.className = 'msg'; }, 3500);
}

async function init() {
  await cargarClientes();
  await cargarArticulos();
  await cargarOrdenes();
}

init();
</script>
</body>
</html>
