<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CARMOTORS — Ventas</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --navy:#1B3A5C; --steel:#4A8FB5; --red:#C0392B; --orange:#E8821A; --cream:#F5F0E8; --dark:#0f2236; --card:#1e3f60; --border:#2a5278; --text:#d4e8f5; --muted:#7aaec8; --green:#5ddb8c; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--dark); color:var(--text); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; padding-bottom:70px; }
    header { background:var(--navy); border-bottom:2px solid var(--orange); padding:14px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:99; }
    .lm { width:36px; height:36px; background:var(--dark); clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); display:flex; align-items:center; justify-content:center; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:20px; color:var(--navy); }
    h1 { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; letter-spacing:2px; color:var(--cream); }
    .tabs { display:flex; background:var(--navy); border-bottom:1px solid var(--border); overflow-x:auto; position:sticky; top:64px; z-index:98; }
    .tbtn { padding:12px 16px; background:none; border:none; color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; }
    .tbtn.active { color:var(--orange); border-bottom-color:var(--orange); }
    main { padding:16px; max-width:800px; margin:0 auto; }
    .sec { display:none; }
    .sec.active { display:block; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:16px; }
    .ctitle { font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; color:var(--orange); margin-bottom:12px; text-transform:uppercase; }
    .fl { display:block; font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; margin-top:10px; }
    input, select { width:100%; background:var(--dark); border:1px solid var(--border); border-radius:6px; padding:9px 12px; color:var(--text); font-size:14px; outline:none; }
    select option { background:var(--dark); }
    .r2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .metodos { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px; }
    .mbtn { background:var(--dark); border:2px solid var(--border); border-radius:8px; padding:8px 4px; text-align:center; cursor:pointer; }
    .mbtn.on { border-color:var(--orange); background:#1a2a3a; }
    .mbtn .ico { font-size:20px; display:block; }
    .mbtn .nom { font-family:'Rajdhani',sans-serif; font-size:11px; }
    .btnadd { width:100%; padding:10px; background:var(--dark); border:2px dashed var(--border); border-radius:8px; color:white; font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; cursor:pointer; margin-top:10px; }
    .btnmain { width:100%; padding:13px; background:var(--orange); color:var(--dark); border:none; border-radius:8px; font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; cursor:pointer; margin-top:12px; }
    .btnmain:disabled { background:var(--border); }
    .btnred { background:var(--red); color:white; }
    .msg { padding:10px; border-radius:6px; font-size:13px; margin-bottom:10px; display:none; }
    .msgok { background:#1a3d2b; color:var(--green); border:1px solid #2a6040; display:block; }
    .msgerr { background:#3d1a1a; color:#e07070; border:1px solid #6a2a2a; display:block; }
    .irow { background:var(--dark); border:1px solid var(--border); border-radius:8px; padding:10px; margin-top:8px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .inom { font-size:13px; color:var(--cream); }
    .isub { font-size:11px; color:var(--muted); }
    .ipr { font-family:'Rajdhani',sans-serif; font-size:16px; color:var(--orange); font-weight:700; }
    .bdel { background:none; border:none; color:var(--red); font-size:18px; cursor:pointer; }
    .tbox { background:var(--navy); border:1px solid var(--orange); border-radius:8px; padding:12px; margin-top:10px; }
    .tr { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:4px; }
    .tf { display:flex; justify-content:space-between; font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; color:var(--orange); border-top:1px solid var(--border); padding-top:8px; margin-top:6px; }
    .rgrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .rcard { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center; }
    .rval { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--orange); }
    .rvalg { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--green); }
    .rlbl { font-size:11px; color:var(--muted); text-transform:uppercase; margin-top:4px; }
    .vc { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px; margin-bottom:10px; }
    .vcf { border-color:var(--red); }
    .vcp { border-color:var(--orange); }
    .vtop { display:flex; justify-content:space-between; align-items:flex-start; }
    .vnom { font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; color:var(--cream); }
    .vsub { font-size:12px; color:var(--muted); margin-top:2px; }
    .vtot { font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; color:var(--orange); text-align:right; }
    .vgan { font-size:11px; color:var(--green); text-align:right; }
    .bdg { display:inline-block; font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px; text-transform:uppercase; }
    .bpag { background:#1a3d2b; color:var(--green); }
    .bfia { background:#3d1a1a; color:#e07070; }
    .bpar { background:#3d3010; color:var(--orange); }
    .stxt { font-size:12px; color:#e07070; margin-top:4px; }
    .acc { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .bwasa { background:#1a3d2b; color:var(--green); border:1px solid #2a6040; border-radius:6px; padding:6px 12px; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; text-decoration:none; }
    .babo { background:#103040; color:var(--steel); border:1px solid var(--border); border-radius:6px; padding:6px 12px; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; cursor:pointer; }
    .empty { text-align:center; padding:40px 20px; color:var(--muted); }
    .empty span { display:block; font-size:32px; margin-bottom:8px; }
    .loading { text-align:center; padding:30px; color:var(--muted); font-size:13px; }
    .bnav { position:fixed; bottom:0; left:0; right:0; background:var(--navy); border-top:2px solid var(--border); display:flex; z-index:100; }
    .bnav a { flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 4px; text-decoration:none; color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:11px; font-weight:600; gap:2px; }
    .bnav a.on { color:var(--orange); border-top:2px solid var(--orange); margin-top:-2px; }
    .bnav a span { font-size:20px; }
  </style>
</head>
<body>
<header>
 <div class="lm">💰</div>
<h1>VENTAS CARMOTORS</h1>
</header>

<div class="tabs">
  <button class="tbtn active" onclick="sw('nueva',this)">➕ Nueva</button>
  <button class="tbtn" onclick="sw('hoy',this)">📊 Hoy</button>
<button class="tbtn" onclick="sw('historial',this)">🗂️ Historial</button>
  <button class="tbtn" onclick="sw('fiados',this)">💳 Fiados</button>
  <button class="tbtn" onclick="sw('caja',this)">🧾 Caja</button>
</div>

<main>

<div id="sec-nueva" class="sec active">
  <div class="card">
    <div class="ctitle">➕ Nueva venta</div>
    <div id="msg" class="msg"></div>
    <label class="fl">Cliente</label>
    <select id="vcliente">
      <option value="">Sin cliente / mostrador</option>
    </select>
    <label class="fl">Tipo de item</label>
    <select id="vtipo" onchange="chTipo()">
      <option value="servicio">🔧 Servicio</option>
      <option value="repuesto">🔩 Repuesto</option>
    </select>
    <div id="boxrep" style="display:none">
      <label class="fl">Repuesto</label>
      <select id="vrep" onchange="chRep()">
        <option value="">Selecciona...</option>
      </select>
    </div>
    <label class="fl">Descripcion</label>
    <input type="text" id="vdesc" placeholder="Ej: Cambio de aceite..."/>
    <div class="r2" style="margin-top:10px">
      <div><label class="fl">Cantidad</label>
<div style="display:flex;align-items:center;gap:8px;margin-top:4px">
  <button type="button" onclick="cambiarCant(-1)" style="width:36px;height:36px;background:var(--dark);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:20px;cursor:pointer;flex-shrink:0">−</button>
  <input type="number" id="vcant" value="1" min="1" style="text-align:center"/>
  <button type="button" onclick="cambiarCant(1)" style="width:36px;height:36px;background:var(--dark);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:20px;cursor:pointer;flex-shrink:0">+</button>
</div></div>
      <div><label class="fl">Precio ($)</label><input type="number" id="vprecio" placeholder="0"/></div>
    </div>
    <button class="btnadd" onclick="addItem()">+ AGREGAR ITEM</button>
    <div id="lista-items"></div>
    <div id="totalbox" class="tbox" style="display:none">
      <div class="tr"><span>Items</span><span id="tcnt">0</span></div>
      '<div class="tr" id="row-gan" style="display:none"><span>Ganancia</span><span id="tgan" style="color:var(--green)">$0</span></div>' +
      <div class="tf"><span>TOTAL</span><span id="ttot">$0</span></div>
    </div>
    <label class="fl">Metodo de pago</label>
    <div class="metodos" id="metodos-box"></div>
    <div id="boxabono" style="display:none">
      <label class="fl">Abono inicial ($)</label>
      <input type="number" id="vabono" placeholder="0 = fiado completo"/>
    </div>
    <button class="btnmain" onclick="guardar()">💰 REGISTRAR VENTA</button>
  </div>
</div>

<div id="sec-hoy" class="sec">
  <div class="rgrid">
    <div class="rcard"><div class="rval" id="rtot">$0</div><div class="rlbl">Vendido hoy</div></div>
    <div class="rcard"><div class="rvalg" id="rgan">$0</div><div class="rlbl">Ganancia</div></div>
    <div class="rcard"><div class="rval" id="rserv">$0</div><div class="rlbl">Servicios</div></div>
    <div class="rcard"><div class="rval" id="rrep">$0</div><div class="rlbl">Repuestos</div></div>
  </div>
  <div id="lista-hoy"><div class="loading">Cargando...</div></div>
</div>

<div id="sec-historial" class="sec">
  <div class="card">
    <div class="ctitle">🗂️ Buscar factura</div>
    <label class="fl">Fecha</label>
    <input type="date" id="hist-fecha"/>
    <label class="fl">Cliente (opcional)</label>
    <select id="hist-cliente">
      <option value="">Todos</option>
    </select>
    <button class="btnmain" onclick="buscarHistorial()">🔍 BUSCAR</button>
  </div>
  <div id="lista-historial"></div>
</div>
  
<div id="sec-fiados" class="sec">
  <div id="lista-fiados"><div class="loading">Cargando...</div></div>
</div>

<div id="sec-caja" class="sec">
  <div class="card" id="box-ap">
    <div class="ctitle">🔓 Abrir turno</div>
    <label class="fl">Vendedor</label>
    <input type="text" id="tvendedor" placeholder="Tu nombre"/>
    <label class="fl">Base de apertura ($)</label>
    <input type="number" id="tbase" placeholder="50000"/>
    <button class="btnmain" onclick="abrirTurno()">🔓 ABRIR TURNO</button>
  </div>
  <div class="card" id="box-ci" style="display:none">
    <div class="ctitle">🔒 Cerrar turno</div>
    <div id="cresumen"></div>
    <label class="fl" style="margin-top:12px">Conteo fisico ($)</label>
    <input type="number" id="tconteo" placeholder="0"/>
    <label class="fl">Notas</label>
    <input type="text" id="tnotas" placeholder="Observaciones..."/>
    <button class="btnmain btnred" style="margin-top:12px" onclick="cerrarTurno()">🔒 CERRAR TURNO</button>
    <a id="btnwasacierre" class="bwasa" style="display:block;text-align:center;padding:10px;margin-top:10px" href="#" target="_blank">📲 WhatsApp resumen</a>
  </div>
  <div class="card">
    <div class="ctitle">📋 Historial</div>
    <div id="lista-turnos"><div class="loading">Cargando...</div></div>
  </div>
</div>

</main>

<nav class="bnav">
  <a href="index.html"><span>🏠</span>PANEL</a>
  <a href="ventas.html" class="on"><span>💰</span>VENTAS</a>
  <a href="clientes.html"><span>👥</span>CLIENTES</a>
  <a href="agendar.html"><span>📅</span>AGENDA</a>
  <a href="admin.html"><span>⚙️</span>ADMIN</a>
</nav>
  <script>
const SUPABASE_URL = 'https://ozpinusbfjjuvkcgkpgr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96cGludXNiZmpqdXZrY2drcGdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTU1NjAsImV4cCI6MjA5MzE3MTU2MH0.AGWaOo4RWnOCt9WlIwL1OFBsFTcKlV4mdFI5ytSpLbs';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let articulos = [];
let clientes = [];
let items = [];
let metodo = 'efectivo';
let turnoActivo = null;

const fmt = n => '$' + Number(n||0).toLocaleString('es-CO');

function sw(sec, btn) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + sec).classList.add('active');
  btn.classList.add('active');
  if (sec === 'hoy') cargarHoy();
  if (sec === 'fiados') cargarFiados();
  if (sec === 'caja') cargarCaja();
}

function chTipo() {
  const tipo = document.getElementById('vtipo').value;
  document.getElementById('boxrep').style.display = tipo === 'repuesto' ? 'block' : 'none';
}

function chRep() {
  const id = document.getElementById('vrep').value;
  const art = articulos.find(a => a.id === id);
  if (art) {
    document.getElementById('vdesc').value = art.nombre;
    document.getElementById('vprecio').value = art.precio;
  }
}

function addItem() {
  const tipo = document.getElementById('vtipo').value;
  const desc = document.getElementById('vdesc').value.trim();
  const cant = parseInt(document.getElementById('vcant').value) || 1;
  const precio = parseFloat(document.getElementById('vprecio').value) || 0;
  if (!desc) { msg('⚠️ Descripcion requerida.', 'err'); return; }
  if (!precio) { msg('⚠️ Precio requerido.', 'err'); return; }
  let costo = 0, articulo_id = null;
  if (tipo === 'repuesto') {
    const id = document.getElementById('vrep').value;
    const art = articulos.find(a => a.id === id);
    if (art) { costo = art.costo || 0; articulo_id = art.id; }
  }
  items.push({ tipo, descripcion: desc, cantidad: cant, precio_unitario: precio, costo_unitario: costo, subtotal: cant * precio, articulo_id });
  renderItems();
  document.getElementById('vdesc').value = '';
  document.getElementById('vprecio').value = '';
  document.getElementById('vcant').value = '1';
  document.getElementById('vrep').value = '';
}

function renderItems() {
  const lista = document.getElementById('lista-items');
  const tbox = document.getElementById('totalbox');
  lista.innerHTML = '';
if (!items.length) { tbox.style.display = 'none'; return; }
  let total = 0, gan = 0;
  items.forEach((it, i) => {
    total += it.subtotal;
    gan += (it.precio_unitario - it.costo_unitario) * it.cantidad;
    const row = document.createElement('div');
    row.className = 'irow';
    const info = document.createElement('div');
    const nom = document.createElement('div');
    nom.className = 'inom';
    nom.textContent = (it.tipo === 'repuesto' ? '🔩 ' : '🔧 ') + it.descripcion;
    const sub = document.createElement('div');
    sub.className = 'isub';
    sub.textContent = it.cantidad + ' x ' + fmt(it.precio_unitario);
    info.appendChild(nom);
    info.appendChild(sub);
    const pr = document.createElement('div');
    pr.className = 'ipr';
    pr.textContent = fmt(it.subtotal);
    const del = document.createElement('button');
    del.className = 'bdel';
    del.textContent = 'x';
    del.onclick = () => { items.splice(i, 1); renderItems(); };
    row.appendChild(info);
    row.appendChild(pr);
    row.appendChild(del);
    lista.appendChild(row);
    const btnAdd = document.querySelector('.btnadd');
if (btnAdd) btnAdd.style.background = items.length > 0 ? '#1a3d2b' : 'var(--dark)';
if (btnAdd) btnAdd.style.color = items.length > 0 ? 'var(--green)' : 'var(--muted)';
if (btnAdd) btnAdd.style.borderColor = items.length > 0 ? '#2a6040' : 'var(--border)';
  });
  document.getElementById('tcnt').textContent = items.length;
  document.getElementById('tgan').textContent = fmt(gan);
  document.getElementById('ttot').textContent = fmt(total);
  tbox.style.display = 'block';
}

function renderMetodos() {
  const box = document.getElementById('metodos-box');
  box.innerHTML = '';
  const modos = [['efectivo', '💵'], ['nequi', '📱'], ['daviplata', '📲'], ['tarjeta', '💳'], ['transferencia', '🏦'], ['credito', '📋']];
  modos.forEach(([nom, ico]) => {
    const btn = document.createElement('div');
    btn.className = 'mbtn' + (metodo === nom ? ' on' : '');
    btn.innerHTML = '<span class="ico">' + ico + '</span><span class="nom">' + nom + '</span>';
    btn.onclick = () => {
      metodo = nom;
      renderMetodos();
      document.getElementById('boxabono').style.display = metodo === 'credito' ? 'block' : 'none';
    };
    box.appendChild(btn);
  });
}

async function guardar() {
  if (!turnoActivo) { msg('⚠️ Abre la caja primero en la pestaña Caja.', 'err'); return; }
  if (!items.length) { msg('⚠️ Agrega al menos un item.', 'err'); return; }
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'GUARDANDO...';
  const total = items.reduce((s, i) => s + i.subtotal, 0);
  const ganancia = items.reduce((s, i) => s + (i.precio_unitario - i.costo_unitario) * i.cantidad, 0);
  const abonado = metodo === 'credito' ? (parseFloat(document.getElementById('vabono').value) || 0) : total;
  const saldo = total - abonado;
  const estado_pago = saldo <= 0 ? 'pagado' : abonado > 0 ? 'parcial' : 'fiado';
  const tieneRep = items.some(i => i.tipo === 'repuesto');
  const tieneServ = items.some(i => i.tipo === 'servicio');
  const tipo = tieneRep && tieneServ ? 'mixto' : items[0].tipo;
  const descripcion = items.map(i => i.descripcion).join(', ');
  const cliente_id = document.getElementById('vcliente').value || null;
  const ahora2 = new Date();
ahora2.setHours(ahora2.getHours() - 5);
const fecha = ahora2.toISOString().split('T')[0];
  const res = await db.from('ventas').insert({ cliente_id, tipo, descripcion, total, ganancia, estado_pago, metodo_pago: metodo, abonado, saldo, fecha }).select().single();
  if (res.error) { btn.disabled = false; btn.textContent = '💰 REGISTRAR VENTA'; msg('❌ ' + res.error.message, 'err'); return; }
  const venta = res.data;
  await db.from('venta_items').insert(items.map(i => Object.assign({}, i, { venta_id: venta.id })));
  await db.from('pagos').insert({ venta_id: venta.id, monto: abonado, metodo, nota: 'Pago inicial' });
  for (let i of items) {
    if (i.articulo_id) {
      const art = articulos.find(a => a.id === i.articulo_id);
      if (art) await db.from('articulos').update({ stock: Math.max(0, art.stock - i.cantidad) }).eq('id', art.id);
    }
  }
  if (cliente_id && saldo > 0) {
    const cliRes = await db.from('clientes').select('saldo_pendiente').eq('id', cliente_id).single();
    if (cliRes.data) await db.from('clientes').update({ saldo_pendiente: (cliRes.data.saldo_pendiente || 0) + saldo }).eq('id', cliente_id);
  }
  items = [];
  renderItems();
  document.getElementById('vcliente').value = '';
  document.getElementById('vdesc').value = '';
  document.getElementById('vprecio').value = '';
  document.getElementById('vcant').value = '1';
  document.getElementById('vabono').value = '';
  metodo = 'efectivo';
  renderMetodos();
  btn.disabled = false;
  btn.textContent = '💰 REGISTRAR VENTA';
  msg('✅ Venta registrada.', 'ok');
  await cargarArticulos();
  await cargarSelectClientes();
}

async function cargarHoy() {
  const ahora = new Date();
ahora.setHours(ahora.getHours() - 5);
const hoy = ahora.toISOString().split('T')[0];
  const res = await db.from('ventas').select('*, clientes(nombre, telefono)').eq('fecha', hoy).order('creado_en', { ascending: false });
  const data = res.data || [];
  let total = 0, gan = 0, serv = 0, rep = 0;
  data.forEach(v => {
  const cobrado = v.estado_pago === 'pagado' ? v.total : (v.abonado || 0);
  total += cobrado;
  gan += v.ganancia || 0;
  if (v.tipo === 'servicio') serv += cobrado;
  if (v.tipo === 'repuesto') rep += cobrado;
});
  document.getElementById('rtot').textContent = fmt(total);
  document.getElementById('rgan').textContent = fmt(gan);
  document.getElementById('rserv').textContent = fmt(serv);
  document.getElementById('rrep').textContent = fmt(rep);
  const cont = document.getElementById('lista-hoy');
  if (!data.length) { cont.innerHTML = '<div class="empty"><span>📭</span>Sin ventas hoy.</div>'; return; }
  cont.innerHTML = '';
  data.forEach(v => {
    const nomCli = v.clientes?.nombre || 'Mostrador';
    const telCli = v.clientes?.telefono || '';
    const card = document.createElement('div');
    card.className = 'vc' + (v.estado_pago !== 'pagado' ? ' ' + (v.estado_pago === 'fiado' ? 'vcf' : 'vcp') : '');
    let html = '<div class="vtop"><div><div class="vnom">' + nomCli + '</div><div class="vsub">' + v.descripcion + '</div><div class="vsub">💳 ' + v.metodo_pago + '</div></div>';
    html += '<div><div class="vtot">' + fmt(v.total) + '</div><div class="vgan">+' + fmt(v.ganancia) + '</div><span class="bdg ' + (v.estado_pago === 'pagado' ? 'bpag' : v.estado_pago === 'fiado' ? 'bfia' : 'bpar') + '">' + v.estado_pago + '</span></div></div>';
    if (v.saldo > 0) html += '<div class="stxt">Saldo: ' + fmt(v.saldo) + '</div>';
    html += '<div class="acc">';
    if (telCli) html += '<button class="bwasa" onclick="wasaVenta(\'' + v.id + '\',\'57' + telCli + '\',' + v.total + ')">📲 WhatsApp</button>';
    if (v.estado_pago !== 'pagado') html += '<button class="babo" onclick="abono(\'' + v.id + '\',' + v.saldo + ')">💵 Abonar</button>';
html += '<button class="babo" onclick="editarVenta(\'' + v.id + '\')">✏️ Editar</button>';
html += '</div>';
    card.innerHTML = html;
    cont.appendChild(card);
  });
}

async function cargarFiados() {
  const res = await db.from('ventas').select('*, clientes(nombre, telefono)').neq('estado_pago', 'pagado').order('fecha', { ascending: true });

  const cont = document.getElementById('lista-fiados');
  if (!data.length) { cont.innerHTML = '<div class="empty"><span>✅</span>Sin fiados.</div>'; return; }
  const grupos = {};
  data.forEach(v => {
    const key = v.cliente_id || 'mostrador';
    const nom = v.clientes?.nombre || 'Mostrador';
    const tel = v.clientes?.telefono || '';
    if (!grupos[key]) grupos[key] = { nombre: nom, telefono: tel, cliente_id: v.cliente_id, ventas: [], total_saldo: 0 };
    grupos[key].ventas.push(v);
    grupos[key].total_saldo += v.saldo || 0;

    html += '<div><div class="vtot">' + fmt(g.total_saldo) + '</div><div class="stxt">Total debe</div></div></div>';
    html += '<div style="margin-top:8px">';
    g.ventas.forEach(v => {
      html += '<div class="hiscard" style="margin-top:6px"><div class="hisnom">' + v.descripcion + '</div>';
      html += '<div class="hissub">📅 ' + v.fecha + ' | Saldo: ' + fmt(v.saldo) + ' | <span class="bdg ' + (v.estado_pago === 'fiado' ? 'bfia' : 'bpar') + '">' + v.estado_pago + '</span></div></div>';
    });
    html += '</div><div class="acc" style="margin-top:10px">';
    if (g.telefono) html += '<a class="bwasa" href="https://wa.me/57' + g.telefono + '?text=' + encodeURIComponent('Hola ' + g.nombre + ', tienes un saldo pendiente de ' + fmt(g.total_saldo) + ' en CARMOTORS. Por favor comunícate con nosotros. Gracias 🙏') + '" target="_blank">📲 Recordar</a>';

  });

async function abono(venta_id, saldo_actual) {
  if (!turnoActivo) { alert('⚠️ Abre la caja primero.'); return; }
  const monto = parseFloat(prompt('Saldo: ' + fmt(saldo_actual) + '\nCuanto abona?'));
  if (!monto || monto <= 0) return;
  const abonoMonto = Math.min(monto, saldo_actual);
  const nuevo_saldo = saldo_actual - abonoMonto;
  const metodo2 = prompt('Metodo: efectivo, nequi, daviplata, tarjeta') || 'efectivo';
  await db.from('pagos').insert({ venta_id, monto: abonoMonto, metodo: metodo2, nota: 'Abono' });
  const vRes = await db.from('ventas').select('abonado, cliente_id, total, ganancia').eq('id', venta_id).single();
  const v = vRes.data;
  await db.from('ventas').update({ abonado: (v.abonado || 0) + abonoMonto, saldo: nuevo_saldo, estado_pago: nuevo_saldo <= 0 ? 'pagado' : 'parcial' }).eq('id', venta_id);
  if (v.cliente_id) {
    const cRes = await db.from('clientes').select('saldo_pendiente').eq('id', v.cliente_id).single();
    if (cRes.data) await db.from('clientes').update({ saldo_pendiente: Math.max(0, (cRes.data.saldo_pendiente || 0) - abonoMonto) }).eq('id', v.cliente_id);
  }
  await cargarHoy();
  await cargarFiados();
}

async function cargarCaja() {
  const hoy = new Date().toISOString().split('T')[0];
  const res = await db.from('turnos_caja').select('*').eq('fecha', hoy).eq('estado', 'abierto').order('hora_apertura', { ascending: false }).limit(1);
  turnoActivo = (res.data && res.data.length) ? res.data[0] : null;
  const boxAp = document.getElementById('box-ap');
  const boxCi = document.getElementById('box-ci');
  if (turnoActivo) { boxAp.style.display = 'none'; boxCi.style.display = 'block'; actualizarResumen(); }
  else { boxAp.style.display = 'block'; boxCi.style.display = 'none'; }
  cargarHistorial();
}

async function abrirTurno() {

async function actualizarResumen() {
  if (!turnoActivo) return;
  const ahora = new Date();
ahora.setHours(ahora.getHours() - 5);
const hoy = ahora.toISOString().split('T')[0];
const resVentas = await db.from('ventas').select('*').eq('fecha', hoy).gte('creado_en', turnoActivo.hora_apertura);
  const ventasHoy = resVentas.data || [];
const ventaIds = ventasHoy.map(v => v.id);
let gan = ventasHoy.reduce((s, v) => s + (v.ganancia || 0), 0);
let total = 0, ef = 0, nq = 0, dp = 0, tj = 0, tr = 0, cr = 0;
if (ventaIds.length) {
  const resPagos = await db.from('pagos').select('*').in('venta_id', ventaIds).gte('creado_en', turnoActivo.hora_apertura);
  const pagos_data = resPagos.data || [];
  pagos_data.forEach(p => {
    total += p.monto;
    if (p.metodo === 'efectivo') ef += p.monto;
    else if (p.metodo === 'nequi') nq += p.monto;
    else if (p.metodo === 'daviplata') dp += p.monto;
    else if (p.metodo === 'tarjeta') tj += p.monto;
    else if (p.metodo === 'transferencia') tr += p.monto;
    else if (p.metodo === 'credito') cr += p.monto;
  });
}
  turnoActivo = Object.assign({}, turnoActivo, { total_ventas: total, ganancia: gan, total_efectivo: ef, total_nequi: nq, total_daviplata: dp, total_tarjeta: tj, total_transferencia: tr, total_credito: cr });
  document.getElementById('cresumen').innerHTML =
    '<div class="tr"><span>Total cobrado</span><span style="color:var(--orange)">' + fmt(total) + '</span></div>' +
    '<div class="tr"><span>Ganancia</span><span style="color:var(--green)">' + fmt(gan) + '</span></div>' +
    '<div class="tr"><span>Efectivo</span><span>' + fmt(ef) + '</span></div>' +
    '<div class="tr"><span>Nequi</span><span>' + fmt(nq) + '</span></div>' +
    '<div class="tr"><span>Daviplata</span><span>' + fmt(dp) + '</span></div>' +
    '<div class="tr"><span>Tarjeta</span><span>' + fmt(tj) + '</span></div>' +
    '<div class="tr"><span>Transferencia</span><span>' + fmt(tr) + '</span></div>' +
    '<div class="tr"><span>Credito</span><span>' + fmt(cr) + '</span></div>' +
    '<div class="tr"><span>Base apertura</span><span>' + fmt(turnoActivo.base_apertura) + '</span></div>';
  const wasa = '*CIERRE CARMOTORS*\nVendedor: ' + turnoActivo.vendedor + '\nFecha: ' + turnoActivo.fecha + '\nTotal: ' + fmt(total) + '\nGanancia: ' + fmt(gan) + '\nEfectivo: ' + fmt(ef) + '\nNequi: ' + fmt(nq) + '\nDaviplata: ' + fmt(dp) + '\nTarjeta: ' + fmt(tj);
  document.getElementById('btnwasacierre').href = 'https://wa.me/?text=' + encodeURIComponent(wasa);
}

async function cerrarTurno() {
  if (!turnoActivo) return;
  const conteo = parseFloat(document.getElementById('tconteo').value) || 0;

  const diferencia = conteo - (turnoActivo.base_apertura + turnoActivo.total_efectivo);

txt += (it.tipo === 'repuesto' ? '🔩 ' : '🔧 ') + it.descripcion + cant + ': ' + fmt(it.precio_unitario * it.cantidad) + '\n';

  txt += '─────────────\n';

    async function abonarTodo(cliente_id, nombre, telefono, total_saldo) {
  if (!turnoActivo) { alert('⚠️ Abre la caja primero.'); return; }
  const monto = parseFloat(prompt(nombre + ' debe: ' + fmt(total_saldo) + '\n¿Cuánto abona?'));
  if (!monto || monto <= 0) return;
  const metodo2 = prompt('Metodo: efectivo, nequi, daviplata, tarjeta') || 'efectivo';
  const res = await db.from('ventas').select('*').eq('cliente_id', cliente_id).neq('estado_pago', 'pagado').order('fecha', { ascending: true });
  const ventas = res.data || [];
  let restante = monto;
  for (let v of ventas) {
    if (restante <= 0) break;
    const pago = Math.min(restante, v.saldo);
    const nuevo_saldo = v.saldo - pago;
    const nuevo_abonado = (v.abonado || 0) + pago;
    const estado = nuevo_saldo <= 0 ? 'pagado' : 'parcial';
    await db.from('ventas').update({ saldo: nuevo_saldo, abonado: nuevo_abonado, estado_pago: estado }).eq('id', v.id);
    await db.from('pagos').insert({ venta_id: v.id, monto: pago, metodo: metodo2, nota: 'Abono grupal' });
    restante -= pago;
  }
  const cliRes = await db.from('clientes').select('saldo_pendiente, saldo_favor').eq('id', cliente_id).single();
  const cli = cliRes.data;
  let nuevo_pendiente = Math.max(0, (cli.saldo_pendiente || 0) - monto);
  let nuevo_favor = cli.saldo_favor || 0;
  if (restante > 0) {
    nuevo_favor = (cli.saldo_favor || 0) + restante;
    alert('✅ Todas las facturas pagadas!\n💚 Saldo a favor: ' + fmt(restante));
  } else {
    alert('✅ Abono registrado.\n💰 Saldo restante: ' + fmt(total_saldo - monto));
  }
  await db.from('clientes').update({ saldo_pendiente: nuevo_pendiente, saldo_favor: nuevo_favor }).eq('id', cliente_id);
  await cargarHoy();
  await cargarFiados();
    }
    async function editarVenta(venta_id) {
  const res = await db.from('venta_items').select('*').eq('venta_id', venta_id);
  const its = res.data || [];
  let txt = 'Items actuales:\n';
  its.forEach((it, i) => {
    txt += (i+1) + '. ' + it.descripcion + ' x' + it.cantidad + ' = ' + fmt(it.subtotal) + '\n';
  });
  txt += '\n¿Qué quieres agregar? (descripcion,precio)\nEj: Cambio aceite,15000';
  const input = prompt(txt);
  if (!input) return;
  const partes = input.split(',');
  if (partes.length < 2) { alert('Formato incorrecto. Usa: descripcion,precio'); return; }
  const desc = partes[0].trim();
  const precio = parseFloat(partes[1].trim()) || 0;
  if (!desc || !precio) { alert('Datos incompletos.'); return; }
  const cant = 1;
  const subtotal = precio * cant;
  await db.from('venta_items').insert({ venta_id, tipo: 'servicio', descripcion: desc, cantidad: cant, precio_unitario: precio, costo_unitario: 0, subtotal });
  const vRes = await db.from('ventas').select('total, abonado, saldo, estado_pago').eq('id', venta_id).single();
  const v = vRes.data;
  const nuevo_total = (v.total || 0) + subtotal;
  const nuevo_saldo = nuevo_total - (v.abonado || 0);
  const estado = nuevo_saldo <= 0 ? 'pagado' : v.abonado > 0 ? 'parcial' : v.estado_pago;
  await db.from('ventas').update({ total: nuevo_total, saldo: nuevo_saldo, estado_pago: estado }).eq('id', venta_id);
  alert('✅ Item agregado. Total nuevo: ' + fmt(nuevo_total));
  await cargarHoy();
    }
    function cambiarCant(n) {
  const inp = document.getElementById('vcant');
  const val = parseInt(inp.value) || 1;
  inp.value = Math.max(1, val + n);
    }
