<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CARMOTORS — Ventas</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --navy:#1B3A5C; --steel:#4A8FB5; --red:#C0392B;
      --orange:#E8821A; --cream:#F5F0E8; --dark:#0f2236;
      --card:#1e3f60; --border:#2a5278; --text:#d4e8f5;
      --muted:#7aaec8; --green:#5ddb8c;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--dark); color:var(--text); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; padding-bottom:70px; }
    header { background:var(--navy); border-bottom:2px solid var(--orange); padding:14px 20px; display:flex; align-items:center; gap:12px; }
    .logo-mark { width:36px; height:36px; background:var(--orange); clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); display:flex; align-items:center; justify-content:center; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:13px; color:var(--dark); flex-shrink:0; }
    header h1 { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; letter-spacing:2px; color:var(--cream); }
    .tabs-main { display:flex; background:var(--navy); padding:0 8px; border-bottom:1px solid var(--border); overflow-x:auto; }
    .tab-main-btn { padding:12px 14px; background:none; border:none; color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; }
    .tab-main-btn.active { color:var(--orange); border-bottom-color:var(--orange); }
    main { padding:16px; max-width:800px; margin:0 auto; }
    .section { display:none; }
    .section.active { display:block; }

    /* CARRITOS */
    .carritos-bar { display:flex; gap:8px; overflow-x:auto; margin-bottom:16px; padding-bottom:4px; }
    .carrito-tab { background:var(--card); border:2px solid var(--border); border-radius:8px; padding:8px 12px; white-space:nowrap; cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; color:var(--muted); flex-shrink:0; }
    .carrito-tab.active { border-color:var(--orange); color:var(--orange); }
    .carrito-tab .cerrar { color:var(--red); margin-left:6px; font-size:16px; }
    .btn-nuevo-carrito { background:var(--orange); border:none; border-radius:8px; padding:8px 14px; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; color:var(--dark); cursor:pointer; flex-shrink:0; }

    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:16px; }
    .card h2 { font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; color:var(--orange); margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; }
    label { display:block; font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; margin-top:10px; }
    input, select { width:100%; background:var(--dark); border:1px solid var(--border); border-radius:6px; padding:9px 12px; color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:14px; outline:none; }
    input:focus, select:focus { border-color:var(--steel); }
    select option { background:var(--dark); }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .metodos { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px; }
    .metodo-btn { background:var(--dark); border:2px solid var(--border); border-radius:8px; padding:8px 4px; text-align:center; cursor:pointer; }
    .metodo-btn.active { border-color:var(--orange); background:#1a2a3a; }
    .metodo-btn .ico { font-size:20px; display:block; }
    .metodo-btn .nom { font-family:'Rajdhani',sans-serif; font-size:11px; color:var(--text); }
    .btn-add { width:100%; padding:10px; background:var(--dark); border:2px dashed var(--border); border-radius:8px; color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600; cursor:pointer; margin-top:10px; }
    .btn-main { width:100%; padding:13px; background:var(--orange); color:var(--dark); border:none; border-radius:8px; font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; cursor:pointer; margin-top:12px; }
    .btn-main:disabled { background:var(--border); cursor:not-allowed; }
    .btn-red { background:var(--red); color:white; }
    .msg { padding:10px; border-radius:6px; font-size:13px; margin-bottom:10px; display:none; }
    .msg.ok { background:#1a3d2b; color:var(--green); border:1px solid #2a6040; display:block; }
    .msg.err { background:#3d1a1a; color:#e07070; border:1px solid #6a2a2a; display:block; }
    .item-row { background:var(--dark); border:1px solid var(--border); border-radius:8px; padding:10px; margin-top:8px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .item-nom { font-size:13px; color:var(--cream); }
    .item-sub { font-size:11px; color:var(--muted); }
    .item-precio { font-family:'Rajdhani',sans-serif; font-size:16px; color:var(--orange); font-weight:700; white-space:nowrap; }
    .btn-del { background:none; border:none; color:var(--red); font-size:18px; cursor:pointer; }
    .total-box { background:var(--navy); border:1px solid var(--orange); border-radius:8px; padding:12px; margin-top:10px; }
    .t-row { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:4px; }
    .t-final { display:flex; justify-content:space-between; font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; color:var(--orange); border-top:1px solid var(--border); padding-top:8px; margin-top:6px; }
    .res-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .res-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center; }
    .res-val { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--orange); }
    .res-val.g { color:var(--green); }
    .res-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; margin-top:4px; }
    .v-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px; margin-bottom:10px; }
    .v-card.fiado { border-color:var(--red); }
    .v-card.parcial { border-color:var(--orange); }
    .v-top { display:flex; justify-content:space-between; align-items:flex-start; }
    .v-nom { font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; color:var(--cream); }
    .v-sub { font-size:12px; color:var(--muted); margin-top:2px; }
    .v-total { font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; color:var(--orange); text-align:right; }
    .v-gan { font-size:11px; color:var(--green); text-align:right; }
    .bdg { display:inline-block; font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px; text-transform:uppercase; }
    .bdg-pagado { background:#1a3d2b; color:var(--green); }
    .bdg-fiado { background:#3d1a1a; color:#e07070; }
    .bdg-parcial { background:#3d3010; color:var(--orange); }
    .saldo-txt { font-size:12px; color:#e07070; margin-top:4px; }
    .acciones { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .btn-wasa { background:#1a3d2b; color:var(--green); border:1px solid #2a6040; border-radius:6px; padding:6px 12px; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; text-decoration:none; }
    .btn-abo { background:#103040; color:var(--steel); border:1px solid var(--border); border-radius:6px; padding:6px 12px; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; cursor:pointer; }
    .empty { text-align:center; padding:40px 20px; color:var(--muted); }
    .empty span { display:block; font-size:32px; margin-bottom:8px; }
    .loading { text-align:center; padding:30px; color:var(--muted); font-size:13px; }
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--navy); border-top:2px solid var(--border); display:flex; z-index:100; }
    .bottom-nav a { flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 4px; text-decoration:none; color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:11px; font-weight:600; gap:2px; }
    .bottom-nav a.active { color:var(--orange); border-top:2px solid var(--orange); margin-top:-2px; }
    .bottom-nav a span { font-size:20px; }
  </style>
</head><body>
<header>
  <div class="logo-mark">CM</div>
  <h1>CARMOTORS</h1>
</header>

<div class="tabs-main">
  <button class="tab-main-btn active" onclick="switchMain('ventas',this)">💰 Ventas</button>
  <button class="tab-main-btn" onclick="switchMain('hoy',this)">📊 Hoy</button>
  <button class="tab-main-btn" onclick="switchMain('fiados',this)">💳 Fiados</button>
  <button class="tab-main-btn" onclick="switchMain('caja',this)">🧾 Caja</button>
</div>

<main>

  <!-- VENTAS CON CARRITOS -->
  <div id="tab-ventas" class="section active">
    <div class="carritos-bar" id="carritos-bar">
      <button class="btn-nuevo-carrito" onclick="nuevoCarrito()">+ Nueva venta</button>
    </div>
    <div id="carrito-contenido">
      <div class="empty"><span>🛒</span>Toca "+ Nueva venta" para empezar.</div>
    </div>
  </div>

  <!-- HOY -->
  <div id="tab-hoy" class="section">
    <div class="res-grid">
      <div class="res-card"><div class="res-val" id="res-total">$0</div><div class="res-lbl">Vendido hoy</div></div>
      <div class="res-card"><div class="res-val g" id="res-gan">$0</div><div class="res-lbl">Ganancia</div></div>
      <div class="res-card"><div class="res-val" id="res-serv">$0</div><div class="res-lbl">Servicios</div></div>
      <div class="res-card"><div class="res-val" id="res-rep">$0</div><div class="res-lbl">Repuestos</div></div>
    </div>
    <div id="lista-hoy"><div class="loading">Cargando...</div></div>
  </div>

  <!-- FIADOS -->
  <div id="tab-fiados" class="section">
    <div id="lista-fiados"><div class="loading">Cargando...</div></div>
  </div>

  <!-- CAJA -->
  <div id="tab-caja" class="section">
    <div class="card" id="box-apertura">
      <h2>🔓 Abrir turno</h2>
      <label>Vendedor</label>
      <input id="turno-vendedor" type="text" placeholder="Tu nombre"/>
      <label>Base de apertura ($)</label>
      <input id="turno-base" type="number" placeholder="Ej: 50000"/>
      <button class="btn-main" onclick="abrirTurno()">🔓 ABRIR TURNO</button>
    </div>
    <div class="card" id="box-cierre" style="display:none">
      <h2>🔒 Cerrar turno</h2>
      <div id="cierre-resumen"></div>
      <label style="margin-top:12px">Conteo físico efectivo ($)</label>
      <input id="conteo-fisico" type="number" placeholder="Cuánto hay en caja"/>
      <label>Notas</label>
      <input id="turno-notas" type="text" placeholder="Observaciones..."/>
      <button class="btn-main btn-red" style="margin-top:12px" onclick="cerrarTurno()">🔒 CERRAR TURNO</button>
      <a id="btn-wasa-cierre" class="btn-wasa" style="display:block;text-align:center;padding:10px;margin-top:10px" href="#" target="_blank">📲 Enviar resumen WhatsApp</a>
    </div>
    <div class="card">
      <h2>📋 Historial turnos</h2>
      <div id="lista-turnos"><div class="loading">Cargando...</div></div>
    </div>
  </div>

</main>

<nav class="bottom-nav">
  <a href="index.html"><span>🏠</span>PANEL</a>
  <a href="ventas.html" class="active"><span>💰</span>VENTAS</a>
  <a href="clientes.html"><span>👥</span>CLIENTES</a>
  <a href="agendar.html"><span>📅</span>AGENDA</a>
  <a href="admin.html"><span>⚙️</span>ADMIN</a>
</nav><script>
  const SUPABASE_URL = 'https://ozpinusbfjjuvkcgkpgr.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96cGludXNiZmpqdXZrY2drcGdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTU1NjAsImV4cCI6MjA5MzE3MTU2MH0.AGWaOo4RWnOCt9WlIwL1OFBsFTcKlV4mdFI5ytSpLbs';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  let articulos = [];
  let clientes = [];
  let turnoActivo = null;
  let carritos = [];
  let carritoActivo = null;

  const fmt = n => '$' + Number(n||0).toLocaleString('es-CO');

  function switchMain(tab, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-main-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    btn.classList.add('active');
    if (tab === 'hoy') cargarHoy();
    if (tab === 'fiados') cargarFiados();
    if (tab === 'caja') cargarCaja();
  }

  // ══ SISTEMA DE CARRITOS ══

  function nuevoCarrito() {
    const id = Date.now();
    const carrito = {
      id, nombre: 'Venta #' + (carritos.length + 1),
      cliente_id: '', cliente_nombre: '',
      items: [], metodo: 'efectivo', abono: 0
    };
    carritos.push(carrito);
    carritoActivo = id;
    renderCarritosTabs();
    renderCarritoActivo();
  }

  function seleccionarCarrito(id) {
    carritoActivo = id;
    renderCarritosTabs();
    renderCarritoActivo();
  }

  function cerrarCarrito(id) {
    if (carritos.length === 1) { carritos = []; carritoActivo = null; }
    else {
      carritos = carritos.filter(c => c.id !== id);
      carritoActivo = carritos[carritos.length - 1].id;
    }
    renderCarritosTabs();
    if (carritoActivo) renderCarritoActivo();
    else document.getElementById('carrito-contenido').innerHTML = '<div class="empty"><span>🛒</span>Toca "+ Nueva venta" para empezar.</div>';
  }

  function getCarrito() { return carritos.find(c => c.id === carritoActivo); }

  function renderCarritosTabs() {
    const bar = document.getElementById('carritos-bar');
    bar.innerHTML = '<button class="btn-nuevo-carrito" onclick="nuevoCarrito()">+ Nueva venta</button>';
    carritos.forEach(c => {
      const div = document.createElement('div');
      div.className = 'carrito-tab' + (c.id === carritoActivo ? ' active' : '');
      div.innerHTML = `<span onclick="seleccionarCarrito(${c.id})">${c.nombre}${c.cliente_nombre ? '<br><small>'+c.cliente_nombre+'</small>' : ''}</span><span class="cerrar" onclick="cerrarCarrito(${c.id})">✕</span>`;
      bar.appendChild(div);
    });
  }

  function renderCarritoActivo() {
    const c = getCarrito();
    if (!c) return;
    const total = c.items.reduce((s,i) => s+i.subtotal, 0);
    const gan = c.items.reduce((s,i) => s+(i.precio_unitario-i.costo_unitario)*i.cantidad, 0);

    document.getElementById('carrito-contenido').innerHTML = `
      <div class="card">
        <h2>🛒 ${c.nombre}</h2>
        <div id="msg-venta-${c.id}" class="msg"></div>

        <label>Cliente</label>
        <select id="cli-${c.id}" onchange="cambiarCliente(${c.id})">
          <option value="">Sin cliente / mostrador</option>
          ${clientes.map(cl => `<option value="${cl.id}" ${c.cliente_id===cl.id?'selected':''}>${cl.nombre}${cl.saldo_pendiente>0?' ⚠️':''}</option>`).join('')}
        </select>

        <label>Tipo de ítem</label>
        <select id="tipo-${c.id}" onchange="cambiarTipo(${c.id})">
          <option value="servicio">🔧 Servicio</option>
          <option value="repuesto">🔩 Repuesto</option>
        </select>

        <div id="box-rep-${c.id}" style="display:none">
          <label>Repuesto</label>
          <select id="rep-${c.id}" onchange="selRepuesto(${c.id})">
            <option value="">Selecciona...</option>
            ${articulos.map(a => `<option value="${a.id}">${a.nombre} — Stock:${a.stock} — ${fmt(a.precio)}</option>`).join('')}
          </select>
        </div>

        <label>Descripción</label>
        <input id="desc-${c.id}" type="text" placeholder="Ej: Cambio de aceite..."/>

        <div class="row2" style="margin-top:10px">
          <div>
            <label>Cantidad</label>
            <input id="cant-${c.id}" type="number" value="1" min="1"/>
          </div>
          <div>
            <label>Precio ($)</label>
            <input id="precio-${c.id}" type="number" placeholder="0"/>
          </div>
        </div>

        <button class="btn-add" onclick="agregarItem(${c.id})">+ AGREGAR ÍTEM</button>

        <div id="items-${c.id}">
          ${c.items.length === 0 ? '<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px">Sin ítems todavía</div>' :
            c.items.map((it,i) => `
              <div class="item-row">
                <div>
                  <div class="item-nom">${it.tipo==='repuesto'?'🔩':'🔧'} ${it.descripcion}</div>
                  <div class="item-sub">${it.cantidad} x ${fmt(it.precio_unitario)}</div>
                </div>
                <div class="item-precio">${fmt(it.subtotal)}</div>
                <button class="btn-del" onclick="quitarItem(${c.id},${i})">✕</button>
              </div>`).join('')}
        </div>

        ${c.items.length > 0 ? `
          <div class="total-box">
            <div class="t-row"><span>Ítems</span><span>${c.items.length}</span></div>
            <div class="t-row"><span>Ganancia est.</span><span style="color:var(--green)">${fmt(gan)}</span></div>
            <div class="t-final"><span>TOTAL</span><span>${fmt(total)}</span></div>
          </div>` : ''}

        <label>Método de pago</label>
        <div class="metodos">
          ${['efectivo💵','nequi📱','daviplata📲','tarjeta💳','transferencia🏦','credito📋'].map(m => {
            const [nom,ico] = m.split(/(?=\p{Emoji})/u);
            return `<div class="metodo-btn ${c.metodo===nom?'active':''}" onclick="selMetodo(${c.id},'${nom}',this)"><span class="ico">${ico||'💵'}</span><span class="nom">${nom}</span></div>`;
          }).join('')}
        </div>

        ${c.metodo === 'credito' ? `
          <label>Abono inicial ($)</label>
          <input id="abono-${c.id}" type="number" placeholder="0 = fiado completo" value="${c.abono||''}" onchange="getCarrito().abono=parseFloat(this.value)||0"/>` : ''}

        <button class="btn-main" onclick="guardarVenta(${c.id})">💰 REGISTRAR VENTA</button>
      </div>`;
  }

  function cambiarCliente(cid) {
    const c = carritos.find(x => x.id === cid);
    const sel = document.getElementById('cli-'+cid);
    c.cliente_id = sel.value;
    c.cliente_nombre = sel.options[sel.selectedIndex].text.replace(' ⚠️','');
    if (!sel.value) c.cliente_nombre = '';
    renderCarritosTabs();
  }

  function cambiarTipo(cid) {
    const tipo = document.getElementById('tipo-'+cid).value;
    document.getElementById('box-rep-'+cid).style.display = tipo==='repuesto' ? 'block' : 'none';
  }

  function selRepuesto(cid) {
    const id = document.getElementById('rep-'+cid).value;
    const art = articulos.find(a => a.id===id);
    if (art) {
      document.getElementById('desc-'+cid).value = art.nombre;
      document.getElementById('precio-'+cid).value = art.precio;
    }
  }

  function selMetodo(cid, metodo, el) {
    const c = carritos.find(x => x.id===cid);
    c.metodo = metodo;
    renderCarritoActivo();
  }

  function agregarItem(cid) {
    const c = carritos.find(x => x.id===cid);
    const tipo = document.getElementById('tipo-'+cid).value;
    const desc = document.getElementById('desc-'+cid).value.trim();
    const cant = parseInt(document.getElementById('cant-'+cid).value)||1;
    const precio = parseFloat(document.getElementById('precio-'+cid).value)||0;
    if (!desc) { msgCarrito(cid,'⚠️ Escribe la descripción.','err'); return; }
    if (!precio) { msgCarrito(cid,'⚠️ Agrega el precio.','err'); return; }
    let costo=0, articulo_id=null;
    if (tipo==='repuesto') {
      const id = document.getElementById('rep-'+cid).value;
      const art = articulos.find(a=>a.id===id);
      if (art) { costo=art.costo||0; articulo_id=art.id; }
    }
    c.items.push({ tipo, descripcion:desc, cantidad:cant, precio_unitario:precio, costo_unitario:costo, subtotal:cant*precio, articulo_id });
    renderCarritoActivo();
  }

  function quitarItem(cid, idx) {
    const c = carritos.find(x => x.id===cid);
    c.items.splice(idx,1);
    renderCarritoActivo();
  }

  function msgCarrito(cid, txt, tipo) {
    const el = document.getElementById('msg-venta-'+cid);
    if (!el) return;
    el.textContent=txt; el.className='msg '+tipo;
    setTimeout(()=>{el.className='msg';},3500);
  }

  async function guardarVenta(cid) {
    const c = carritos.find(x => x.id===cid);
    if (!c.items.length) { msgCarrito(cid,'⚠️ Agrega al menos un ítem.','err'); return; }
    const btn = event.target;
    btn.disabled=true; btn.textContent='GUARDANDO...';
    const total = c.items.reduce((s,i)=>s+i.subtotal,0);
    const ganancia = c.items.reduce((s,i)=>s+(i.precio_unitario-i.costo_unitario)*i.cantidad,0);
    const abonado = c.metodo==='credito' ? (c.abono||0) : total;
    const saldo = total-abonado;
    const estado_pago = saldo<=0?'pagado':abonado>0?'parcial':'fiado';
    const tipo = c.items.some(i=>i.tipo==='repuesto')&&c.items.some(i=>i.tipo==='servicio')?'mixto':c.items[0].tipo;
    const descripcion = c.items.map(i=>i.descripcion).join(', ');
    const { data:venta, error } = await db.from('ventas').insert({ cliente_id:c.cliente_id||null, tipo, descripcion, total, ganancia, estado_pago, metodo_pago:c.metodo, abonado, saldo, fecha:new Date().toISOString().split('T')[0] }).select().single();
    if (error) { btn.disabled=false; btn.textContent='💰 REGISTRAR VENTA'; msgCarrito(cid,'❌ '+error.message,'err'); return; }
    await db.from('venta_items').insert(c.items.map(i=>({...i,venta_id:venta.id})));
    await db.from('pagos').insert({venta_id:venta.id,monto:abonado,metodo:c.metodo,nota:'Pago inicial'});
    for (const it of c.items) {
      if (it.articulo_id) {
        const art = articulos.find(a=>a.id===it.articulo_id);
        if (art) await db.from('articulos').update({stock:Math.max(0,art.stock-it.cantidad)}).eq('id',art.id);
      }
    }
    if (c.cliente_id && saldo>0) {
      const {data:cli} = await db.from('clientes').select('saldo_pendiente').eq('id',c.cliente_id).single();
      if (cli) await db.from('clientes').update({saldo_pendiente:(cli.saldo_pendiente||0)+saldo}).eq('id',c.cliente_id);
    }
    cerrarCarrito(cid);
    await cargarArticulos();
    await cargarSelectClientes();
  }

  async function registrarAbono(venta_id, saldo_actual) {
    const monto = parseFloat(prompt(`Saldo: ${fmt(saldo_actual)}\n¿Cuánto abona?`));
    if (!monto||monto<=0) return;
    const abono = Math.min(monto,saldo_actual);
    const nuevo_saldo = saldo_actual-abono;
    const metodo = prompt('Método: efectivo, nequi, daviplata, tarjeta')||'efectivo';
    await db.from('pagos').insert({venta_id,monto:abono,metodo,nota:'Abono'});
    const {data:v} = await db.from('ventas').select('abonado,cliente_id').eq('id',venta_id).single();
    await db.from('ventas').update({abonado:(v.abonado||0)+abono,saldo:nuevo_saldo,estado_pago:nuevo_saldo<=0?'pagado':'parcial'}).eq('id',venta_id);
    if (v.cliente_id) {
      const {data:cli} = await db.from('clientes').select('saldo_pendiente').eq('id',v.cliente_id).single();
      if (cli) await db.from('clientes').update({saldo_pendiente:Math.max(0,(cli.saldo_pendiente||0)-abono)}).eq('id',v.cliente_id);
    }
    cargarHoy(); cargarFiados();
  }

  async function cargarCaja() {
    const hoy = new Date().toISOString().split('T')[0];
    const {data} = await db.from('turnos_caja').select('*').eq('fecha',hoy).eq('estado','abierto').order('hora_apertura',{ascending:false}).limit(1);
    turnoActivo = data&&data.length ? data[0] : null;
    const boxA=document.getElementById('box-apertura');
    const boxC=document.getElementById('box-cierre');
    if (turnoActivo) { boxA.style.display='none'; boxC.style.display='block'; actualizarResumen(); }
    else { boxA.style.display='block'; boxC.style.display='none'; }
    cargarHistorial();
  }

  async function abrirTurno() {
    const vendedor=document.getElementById('turno-vendedor').value.trim();
    const base=parseFloat(document.getElementById('turno-base').value)||0;
    if (!vendedor){alert('Escribe tu nombre');return;}
    const btn=event.target; btn.disabled=true; btn.textContent='ABRIENDO...';
    await db.from('turnos_caja').insert({vendedor,base_apertura:base,estado:'abierto',fecha:new Date().toISOString().split('T')[0]});
    btn.disabled=false; btn.textContent='🔓 ABRIR TURNO';
    cargarCaja();
  }

  async function actualizarResumen() {
    if (!turnoActivo) return;
    const {data:ventas} = await db.from('ventas').select('*').eq('fecha',turnoActivo.fecha).gte('creado_en',turnoActivo.hora_apertura);
    if (!ventas) return;
    let total=0,gan=0,ef=0,nq=0,dp=0,tj=0,tr=0,cr=0;
    ventas.forEach(v=>{ total+=v.total; gan+=v.ganancia;
      if(v.metodo_pago==='efectivo')ef+=v.abonado;
      else if(v.metodo_pago==='nequi')nq+=v.abonado;
      else if(v.metodo_pago==='daviplata')dp+=v.abonado;
      else if(v.metodo_pago==='tarjeta')tj+=v.abonado;
      else if(v.metodo_pago==='transferencia')tr+=v.abonado;
      else if(v.metodo_pago==='credito')cr+=v.abonado;
    });
    turnoActivo={...turnoActivo,total_ventas:total,ganancia:gan,total_efectivo:ef,total_nequi:nq,total_daviplata:dp,total_tarjeta:tj,total_transferencia:tr,total_credito:cr};
    document.getElementById('cierre-resumen').innerHTML=`
      <div class="t-row"><span>💰 Total</span><span style="color:var(--orange)">${fmt(total)}</span></div>
      <div class="t-row"><span>📈 Ganancia</span><span style="color:var(--green)">${fmt(gan)}</span></div>
      <div class="t-row"><span>💵 Efectivo</span><span>${fmt(ef)}</span></div>
      <div class="t-row"><span>📱 Nequi</span><span>${fmt(nq)}</span></div>
      <div class="t-row"><span>📲 Daviplata</span><span>${fmt(dp)}</span></div>
      <div class="t-row"><span>💳 Tarjeta</span><span>${fmt(tj)}</span></div>
      <div class="t-row"><span>🏦 Transferencia</span><span>${fmt(tr)}</span></div>
      <div class="t-row"><span>📋 Crédito</span><span>${fmt(cr)}</span></div>
      <div class="t-row"><span>🏦 Base apertura</span><span>${fmt(turnoActivo.base_apertura)}</span></div>`;
    const wasa=`*CIERRE CARMOTORS*\n👤 ${turnoActivo.vendedor}\n📅 ${turnoActivo.fecha}\n💰 Total: ${fmt(total)}\n📈 Ganancia: ${fmt(gan)}\n💵 Efectivo: ${fmt(ef)}\n📱 Nequi: ${fmt(nq)}\n📲 Daviplata: ${fmt(dp)}\n💳 Tarjeta: ${fmt(tj)}`;
    document.getElementById('btn-wasa-cierre').href=`https://wa.me/?text=${encodeURIComponent(wasa)}`;
  }

  async function cerrarTurno() {
    if (!turnoActivo) return;
    const conteo=parseFloat(document.getElementById('conteo-fisico').value)||0;
    const notas=document.getElementById('turno-notas').value.trim();
    const diferencia=conteo-(turnoActivo.base_apertura+turnoActivo.total_efectivo);
    const btn=event.target; btn.disabled=true; btn.textContent='CERRANDO...';
    await db.from('turnos_caja').update({estado:'cerrado',hora_cierre:new Date().toISOString(),total_efectivo:turnoActivo.total_efectivo,total_nequi:turnoActivo.total_nequi,total_daviplata:turnoActivo.total_daviplata,total_tarjeta:turnoActivo.total_tarjeta,total_transferencia:turnoActivo.total_transferencia,total_credito:turnoActivo.total_credito,total_ventas:turnoActivo.total_ventas,ganancia:turnoActivo.ganancia,conteo_fisico:conteo,diferencia,notas}).eq('id',turnoActivo.id);
    btn.disabled=false; btn.textContent='🔒 CERRAR TURNO';
    turnoActivo=null; cargarCaja();
  }
