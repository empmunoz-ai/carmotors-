<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CARMOTORS</title>
</head>
<body>
  <h1>🚗 CARMOTORS</h1>
  <form id="form-cliente">
    <input id="nombre" placeholder="Nombre" required>
    <input id="telefono" placeholder="Teléfono">
    <button type="submit">Guardar</button>
  </form>
  <table border="1">
    <tr><th>Nombre</th><th>Teléfono</th></tr>
    <tbody id="lista"></tbody>
  </table>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ⚠️ CAMBIA ESTO POR TUS DATOS REALES:
    const supabase = window.supabase.createClient('https://swbnbjtnhthwipfuryqq.supabase.co', 'TU_ANON_KEY_AQUI');

    async function cargar() {
      const { data } = await supabase.from('clientes').select('*');
      document.getElementById('lista').innerHTML = data.map(c => 
        `<tr><td>${c.nombre}</td><td>${c.telefono||''}</td></tr>`
      ).join('');
    }

    document.getElementById('form-cliente').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nombre = document.getElementById('nombre').value;
      const telefono = document.getElementById('telefono').value;
      const { error } = await supabase.from('clientes').insert([{ nombre, telefono }]);
      if (error) alert('❌ Error: ' + error.message);
      else { alert('✅ Guardado'); document.getElementById('form-cliente').reset(); cargar(); }
    });
    cargar();
  </script>
</body>
</html>
